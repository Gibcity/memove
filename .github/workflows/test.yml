name: Tests

permissions:
  contents: read

on:
  pull_request:
    branches: [main, dev]
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'packages/shared/**'
      - '.github/workflows/test.yml'

jobs:
  i18n-parity:
    name: i18n Key Parity
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check i18n key parity
        run: node packages/shared/scripts/i18n-parity.mjs --strict

  agents-md-drift:
    name: AGENTS.md Drift Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Verify AGENTS.md paths resolve and size under 300 lines
        run: node scripts/check-agents-md.mjs

  shared-contracts:
    name: Shared Contracts (Zod)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --workspace @memove/shared

      - name: Typecheck
        run: cd packages/shared && npm run typecheck

      - name: Run tests
        run: cd packages/shared && npm test

  server-tests:
    name: Server Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Ensure @swc/core's Linux binary for unplugin-swc
        # The lockfile was generated on Windows and omits @swc/core's Linux
        # optional native binary, so npm ci/install skips it on the runner.
        # Install the matching version explicitly so the server's SWC transform
        # (apps/api/vitest.config.ts) can load.
        run: |
          SWC_VERSION=$(node -p "require('@swc/core/package.json').version")
          npm install --no-save --legacy-peer-deps "@swc/core-linux-x64-gnu@$SWC_VERSION"

      - name: Build shared
        run: npm run build --workspace=@memove/shared

      - name: Build server (tsc -> dist)
        run: cd apps/api && npm run build

      - name: Typecheck
        run: cd apps/api && npm run typecheck

      - name: Lint
        run: cd apps/api && npm run lint:check

      - name: Run tests
        run: cd apps/api && npm run test:coverage

      - name: Upload coverage
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: backend-coverage
          path: apps/api/coverage/
          retention-days: 7

  client-tests:
    name: Client Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --workspace @memove/shared && npm ci --workspace @memove/client

      - name: Build shared
        run: npm run build --workspace=@memove/shared

      - name: Typecheck
        run: cd apps/web && npm run typecheck

      - name: Lint
        run: cd apps/web && npm run lint:check

      - name: Page pattern check
        run: cd apps/web && npm run lint:pages

      - name: Run tests
        run: cd apps/web && npm run test:coverage

      - name: Upload coverage
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: frontend-coverage
          path: apps/web/coverage/
          retention-days: 7
